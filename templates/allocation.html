{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session</title>
    <link rel="stylesheet" href="{% static 'css/alloc_style.css'%}" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>

  <body>
    <div id="points_remaining">
      <h1>Total points: {{points_remaining}}</h1>
    </div>
    <div class="card-container">
      <div class="multipliers position-left">
        <div class="m-container">
          <dl>
            {% for multiplier in multipliers %}
            <dd>
              <form action="" method="post" class="multiplier-field">
                <input type="checkbox" name="left-card" />
                <label for="left-card">{{multiplier.name}}</label>
              </form>
            </dd>
            {% endfor %}
          </dl>
        </div>
      </div>
      <div class="card card-1">{% include "card.html" with card=card_1 %}</div>
      <div class="card card-2">{% include "card.html" with card=card_2 %}</div>
      <div class="multipliers position-right">
        <div class="m-container">
          <dl>
            {% for multiplier in multipliers %}
            <dd>
              <form action="" method="post" class="multiplier-field">
                <input type="checkbox" name="right-card" />
                <label for="right-card">{{multiplier.name}}</label>
              </form>
            </dd>
            {% endfor %}
          </dl>
        </div>
      </div>
    </div>
    <div class="reset-container">
      <form action="{% url 'reset_points' session.id%}" method="post">
        {% csrf_token %}
        <input type="submit" value="Reset points" />
      </form>
    </div>
  </body>
</html>
