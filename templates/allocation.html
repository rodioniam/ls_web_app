{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session</title>
    <link rel="stylesheet" href="{% static 'css/alloc_style.css'%}" />
  </head>
  <body>
    <div class="session">
      <h1>{{session.total_points}}</h1>
    </div>

    <p class="test">hello</p>
    {% for card in cards %}
    <table class="card">
      <h3>{{card.name}}</h3>
      <p>{{card.points}}</p>

      <form action="" method="post">
        <button>+</button>
      </form>

      <form action="" method="post">
        <button>-</button>
      </form>
    </table>
    {% endfor %}
  </body>
</html>
